# Sonar Project Configuration
sonar.projectKey=filmpire-microservices
sonar.projectName=Filmpire Microservices
sonar.projectVersion=1.0.0-SNAPSHOT

# Source directories
sonar.sources=backend/*/src/main/java
sonar.tests=backend/*/src/test/java

# Java version
sonar.java.source=17
sonar.java.target=17

# Encoding
sonar.sourceEncoding=UTF-8

# Exclude generated code from analysis
sonar.exclusions=**/generated/**,**/build/**,**/bin/**,**/target/**,**/*MapperImpl.java

# Test exclusions
sonar.test.exclusions=**/src/test/**

# Coverage
sonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/test/jacocoTestReport.xml

# Rules disabled for test files
sonar.issue.ignore.multicriteria=e1,e2,e3

# Rule 1: Disable method naming convention in tests (S100)
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/src/test/**/*

# Rule 2: Disable field injection warning in tests (S3305)
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S3305
sonar.issue.ignore.multicriteria.e2.resourceKey=**/src/test/**/*

# Rule 3: Disable string literal duplication in tests (S1192)
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=**/src/test/**/*


