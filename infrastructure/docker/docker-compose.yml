version: '3.9'

services:
  # PostgreSQL 17 - For User Service, Actor Service
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: filmpire-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filmpire}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      # Extra databases created by init-scripts/01-create-multiple-databases.sh
      # on FIRST volume init. user-service deliberately uses the default
      # POSTGRES_DB (filmpire); actor-service owns filmpire_actor (ADR-002).
      # These names must match the POSTGRES_URL of each service below.
      POSTGRES_MULTIPLE_DATABASES: filmpire_actor
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs only when postgres_data is empty. To add a database to an
      # already-provisioned volume, create it by hand or `down -v` first.
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-filmpire}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MongoDB 8.0 - For Movie Service, AI Service, Media Service
  mongodb:
    image: docker.io/library/mongo:8.0
    container_name: filmpire-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-filmpire}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis 7.4 - For API Gateway (rate limiting, session)
  redis:
    image: docker.io/library/redis:7.4-alpine
    container_name: filmpire-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # MinIO - For Media Service (object storage)
  minio:
    image: docker.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: filmpire-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Adminer - Database Management UI (Optional)
  adminer:
    image: docker.io/library/adminer:latest
    container_name: filmpire-adminer
    ports:
      - "${ADMINER_PORT:-9081}:8080"
    networks:
      - filmpire-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Mongo Express - MongoDB Management UI (Optional)
  mongo-express:
    image: docker.io/library/mongo-express:latest
    container_name: filmpire-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "${MONGO_EXPRESS_PORT:-9082}:8081"
    networks:
      - filmpire-network
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy

  # Redis Commander - Redis Management UI (Optional)
  redis-commander:
    image: docker.io/rediscommander/redis-commander:latest
    container_name: filmpire-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_COMMANDER_PORT:-9083}:8081"
    networks:
      - filmpire-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Discovery Service (Eureka Server) - Service Registry
  discovery-service:
    build:
      context: ../..
      dockerfile: backend/discovery-service/Dockerfile
    container_name: filmpire-discovery-service
    ports:
      - "${DISCOVERY_SERVICE_PORT:-8761}:8761"
    networks:
      - filmpire-network
    environment:
      SPRING_APPLICATION_NAME: discovery-service
      EUREKA_INSTANCE_HOSTNAME: discovery-service
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Config Service (Spring Cloud Config Server)
  config-service:
    build:
      context: ../..
      dockerfile: backend/config-service/Dockerfile
    container_name: filmpire-config-service
    ports:
      - "${CONFIG_SERVICE_PORT:-8888}:8888"
    networks:
      - filmpire-network
    environment:
      SPRING_APPLICATION_NAME: config-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCHLOCATIONS: classpath:/config
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # API Gateway (Spring Cloud Gateway)
  api-gateway:
    build:
      context: ../..
      dockerfile: backend/api-gateway/Dockerfile
    container_name: filmpire-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    networks:
      - filmpire-network
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-filmpire-secret-key-change-in-production}
      # REQUIRED, not optional: the tmdb-authentication/account proxy routes use
      # `AddRequestParameter=api_key,${tmdb.api.key}`, and that filter rejects an
      # empty value at bind time. Without this the gateway does not merely lose
      # those routes — route refresh throws and the container crash-loops.
      TMDB_API_KEY: ${TMDB_API_KEY}
    depends_on:
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # Movie Service - Movie Discovery and Search
  movie-service:
    build:
      context: ../..
      dockerfile: backend/movie-service/Dockerfile
    container_name: filmpire-movie-service
    ports:
      - "${MOVIE_SERVICE_PORT:-8081}:8081"
    networks:
      - filmpire-network
    environment:
      SPRING_APPLICATION_NAME: movie-service
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/filmpire?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      TMDB_API_KEY: ${TMDB_API_KEY}
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # User Service - JWT auth, profiles, favorites & watchlist (#17)
  # Uses the default `filmpire` database; owns no TMDB data at all.
  user-service:
    build:
      context: ../..
      dockerfile: backend/user-service/Dockerfile
    container_name: filmpire-user-service
    ports:
      - "${USER_SERVICE_PORT:-8082}:8082"
    networks:
      - filmpire-network
    environment:
      SPRING_APPLICATION_NAME: user-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-filmpire}
      POSTGRES_USERNAME: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      # CONTRACT: must match the api-gateway's JWT_SECRET — the gateway
      # validates the access tokens this service issues (HS256, shared secret).
      JWT_SECRET: ${JWT_SECRET:-filmpire-secret-key-change-in-production}
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # Actor Service - TMDB-shaped /person facade + native actor API (#18, #32)
  # Owns filmpire_actor (ADR-002); caches in Redis; reads TMDB as seed data.
  actor-service:
    build:
      context: ../..
      dockerfile: backend/actor-service/Dockerfile
    container_name: filmpire-actor-service
    ports:
      - "${ACTOR_SERVICE_PORT:-8083}:8083"
    networks:
      - filmpire-network
    environment:
      SPRING_APPLICATION_NAME: actor-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      POSTGRES_URL: jdbc:postgresql://postgres:5432/filmpire_actor
      POSTGRES_USERNAME: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      TMDB_API_KEY: ${TMDB_API_KEY}
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SonarQube static analysis (#20). Behind the `sonar` compose profile so the
  # normal stack — and the e2e smoke job — never starts this heavy tool. Bring
  # it up on demand:  docker compose --profile sonar up -d
  # ---------------------------------------------------------------------------

  # Dedicated PostgreSQL for SonarQube — kept SEPARATE from the app's `postgres`
  # (ADR-002 in spirit: a tool's store is not the app's store, and SonarQube
  # owns/migrates its own schema).
  sonar-db:
    image: docker.io/library/postgres:17-alpine
    container_name: filmpire-sonar-db
    profiles: ["sonar"]
    environment:
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d ${SONAR_DB_NAME:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  sonarqube:
    # Community edition, latest. Tested against 26.7.0 (Community Build). Pin to
    # a specific `<version>-community` tag for full reproducibility once a
    # version is chosen — but never reuse an older version's data volume (below).
    image: docker.io/library/sonarqube:community
    container_name: filmpire-sonarqube
    profiles: ["sonar"]
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      # Host 9010 (NOT 9000 — MinIO already binds 9000/9001) → container 9000.
      - "${SONAR_HOST_PORT:-9010}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - filmpire-network
    # SonarQube's Elasticsearch needs a high mmap limit. This host already has
    # vm.max_map_count >= 262144; if a fresh host fails to boot ES, set it with
    #   sudo sysctl -w vm.max_map_count=262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O- http://localhost:9000/api/system/status 2>/dev/null | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  # SonarQube (#20). NOTE: do not reuse volumes across major SonarQube
  # versions — a data dir written by an older image (e.g. the old
  # lts-community) makes the new web server crash-loop on startup while
  # cleaning its work dir. On a version bump, `docker volume rm` these first.
  sonarqube_db_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local

networks:
  filmpire-network:
    driver: bridge
    name: filmpire-network
