version: '3.9'

services:
  # PostgreSQL 17 - For User Service, Actor Service
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: filmpire-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filmpire}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_MULTIPLE_DATABASES: filmpire_users,filmpire_actors
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-filmpire}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MongoDB 8.0 - For Movie Service, AI Service, Media Service
  mongodb:
    image: docker.io/library/mongo:8.0
    container_name: filmpire-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-filmpire}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis 7.4 - For API Gateway (rate limiting, session)
  redis:
    image: docker.io/library/redis:7.4-alpine
    container_name: filmpire-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # MinIO - For Media Service (object storage)
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: filmpire-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Adminer - Database Management UI (Optional)
  adminer:
    image: docker.io/library/adminer:latest
    container_name: filmpire-adminer
    ports:
      - "${ADMINER_PORT:-9081}:8080"
    networks:
      - filmpire-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Mongo Express - MongoDB Management UI (Optional)
  mongo-express:
    image: docker.io/library/mongo-express:latest
    container_name: filmpire-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "${MONGO_EXPRESS_PORT:-9082}:8081"
    networks:
      - filmpire-network
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy

  # Redis Commander - Redis Management UI (Optional)
  redis-commander:
    image: docker.io/rediscommander/redis-commander:latest
    container_name: filmpire-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_COMMANDER_PORT:-9083}:8081"
    networks:
      - filmpire-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Discovery Service (Eureka Server) - Service Registry
  discovery-service:
    build:
      context: ../../..
      dockerfile: backend/discovery-service/Dockerfile
    container_name: filmpire-discovery-service
    ports:
      - "${DISCOVERY_SERVICE_PORT:-8761}:8761"
    networks:
      - filmpire-network
    environment:
      SPRING_APPLICATION_NAME: discovery-service
      EUREKA_INSTANCE_HOSTNAME: discovery-service
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  filmpire-network:
    driver: bridge
    name: filmpire-network
