version: '3.9'

services:
  # PostgreSQL
  postgres:
    image: postgres:18-alpine
    container_name: filmpire-postgres
    environment:
      POSTGRES_DB: filmpire
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - filmpire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:8.2
    container_name: filmpire-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: filmpire
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - filmpire-network

  # Redis
  redis:
    image: redis:8.2-alpine
    container_name: filmpire-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - filmpire-network

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  filmpire-network:
    driver: bridge
