server:
  port: 8080
  # Additional request size and connection limits
  max-http-request-header-size: 16KB  # Maximum HTTP header size
  netty:
    connection-timeout: 5s    # Connection timeout for Netty
    idle-timeout: 30s         # Idle connection timeout

spring:
  application:
    name: api-gateway
  
  # Request size limits to prevent large payload attacks
  http:
    codecs:
      max-in-memory-size: 10MB  # Maximum request body size
  
  cloud:
    gateway:
      server:
        webflux:
          # HTTP client configuration for connection limits and timeouts
          httpclient:
            pool:
              max-connections: 1000  # Global max connections to prevent exhaustion
              max-idle-time: 30s     # Close idle connections after 30 seconds
              max-life-time: 60s     # Close connections after 60 seconds
            connect-timeout: 5000    # 5 second connection timeout
            response-timeout: 10s    # 10 second response timeout
          # Global CORS configuration
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:3000"
                  - "http://localhost:3001"
                  - "http://localhost:5173"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowed-headers:
                  - "*"
                allow-credentials: true
                max-age: 3600
      
          # Default filters for all routes
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false
      
          # Route definitions
          routes:
            # Movie Service Routes
            - id: movie-service
              uri: lb://movie-service
              predicates:
                - Path=/api/v1/movies/**,/api/v1/genres/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: movieServiceCircuitBreaker
                    fallbackUri: forward:/fallback/movies
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    "[redis-rate-limiter.replenishRate]": 10
                    "[redis-rate-limiter.burstCapacity]": 20
                    "[redis-rate-limiter.requestedTokens]": 1
        
            # User Service Routes
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/users
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    "[redis-rate-limiter.replenishRate]": 10
                    "[redis-rate-limiter.burstCapacity]": 20
        
            # Authentication Routes (strict rate limiting to prevent brute force)
            - id: auth-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authServiceCircuitBreaker
                    fallbackUri: forward:/fallback/auth
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    "[redis-rate-limiter.replenishRate]": 5
                    "[redis-rate-limiter.burstCapacity]": 10
        
            # Actor Service Routes
            - id: actor-service
              uri: lb://actor-service
              predicates:
                - Path=/api/v1/actors/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: actorServiceCircuitBreaker
                    fallbackUri: forward:/fallback/actors
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    "[redis-rate-limiter.replenishRate]": 10
                    "[redis-rate-limiter.burstCapacity]": 20
        
            # AI Service Routes
            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/v1/ai/**, /api/v1/recommendations/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: aiServiceCircuitBreaker
                    fallbackUri: forward:/fallback/ai
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    "[redis-rate-limiter.replenishRate]": 5
                    "[redis-rate-limiter.burstCapacity]": 10
        
            # Media Service Routes
            - id: media-service
              uri: lb://media-service
              predicates:
                - Path=/api/v1/media/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: mediaServiceCircuitBreaker
                    fallbackUri: forward:/fallback/media
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    "[redis-rate-limiter.replenishRate]": 20
                    "[redis-rate-limiter.burstCapacity]": 40

            # ---------------------------------------------------------------
            # TMDB v3 FACADE routes (#33) — bare TMDB paths the Filmpire React
            # app calls. Served by the movie/actor facade controllers, which
            # inject the server-side TMDB key themselves; the gateway strips any
            # client-sent api_key so it never reaches a downstream.
            # ---------------------------------------------------------------
            - id: tmdb-movie-facade
              uri: lb://movie-service
              predicates:
                - Path=/movie/**,/genre/**,/discover/**,/search/**
              filters:
                - RemoveRequestParameter=api_key
                - name: CircuitBreaker
                  args:
                    name: movieServiceCircuitBreaker
                    fallbackUri: forward:/fallback/movies

            - id: tmdb-person-facade
              uri: lb://actor-service
              predicates:
                - Path=/person/**
              filters:
                - RemoveRequestParameter=api_key
                - name: CircuitBreaker
                  args:
                    name: actorServiceCircuitBreaker
                    fallbackUri: forward:/fallback/actors

            # ---------------------------------------------------------------
            # TMDB auth/account PROXY routes (#33) — passed straight through to
            # the real TMDB so the React app's login + favorites/watchlist keep
            # using the user's real TMDB account. The gateway removes the
            # client's api_key and injects the server-side key; session_id is
            # forwarded untouched. PrefixPath=/3 restores the TMDB v3 base path.
            # ---------------------------------------------------------------
            - id: tmdb-authentication-proxy
              uri: https://api.themoviedb.org
              predicates:
                - Path=/authentication/**
              filters:
                - PrefixPath=/3
                - RemoveRequestParameter=api_key
                - AddRequestParameter=api_key,${tmdb.api.key}

            - id: tmdb-account-proxy
              uri: https://api.themoviedb.org
              predicates:
                - Path=/account/**
              filters:
                - PrefixPath=/3
                - RemoveRequestParameter=api_key
                - AddRequestParameter=api_key,${tmdb.api.key}

          # Service discovery
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
  
  # Redis configuration for rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
    instance-info-replication-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10

# Resilience4j Circuit Breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
    instances:
      movieServiceCircuitBreaker:
        base-config: default
      userServiceCircuitBreaker:
        base-config: default
      authServiceCircuitBreaker:
        base-config: default
      actorServiceCircuitBreaker:
        base-config: default
      aiServiceCircuitBreaker:
        base-config: default
      mediaServiceCircuitBreaker:
        base-config: default
  
  timelimiter:
    configs:
      default:
        timeout-duration: 5s

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:filmpire-secret-key-change-in-production}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

# TMDB server-side API key (#33) — injected into the auth/account proxy routes
# so the real key never lives in the browser. Set via TMDB_API_KEY in prod.
tmdb:
  api:
    key: ${TMDB_API_KEY:}

# Management and Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    gateway:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true

# Logging configuration
logging:
  level:
    root: INFO
    "[com.filmpire.gateway]": DEBUG
    "[org.springframework.cloud.gateway]": DEBUG
    "[org.springframework.security]": DEBUG
    "[io.github.resilience4j]": DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

