# MapStruct Configuration
# Default settings for all MapStruct mappers in the shared-library
# These settings apply when @Mapper annotation doesn't specify them

# Component model: spring (for Spring dependency injection)
# Mappers will be Spring components by default
mapstruct.defaultComponentModel=spring

# Unmapped target policy: WARN (warn about unmapped target properties)
# Use @Mapping(target = "ignored", ignore = true) to suppress warnings
mapstruct.unmappedTargetPolicy=WARN

# Unmapped source policy: IGNORE (ignore unmapped source properties)
mapstruct.unmappedSourcePolicy=IGNORE

# Suppress timestamp in generated code (for reproducible builds)
mapstruct.suppressGeneratorTimestamp=false

# Verbose reporting (set to true for debugging)
mapstruct.verbose=false

