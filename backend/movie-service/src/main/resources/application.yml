server:
  port: 8081

spring:
  application:
    name: movie-service
  data:
    mongodb:
      uri: mongodb://admin:admin123@localhost:27017/filmpire?authSource=admin
      database: filmpire
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  redis:
    host: localhost
    port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

