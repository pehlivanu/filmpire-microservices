server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
        # Git mode disabled - using native/filesystem mode instead
        # git:
        #   uri: https://github.com/yourusername/filmpire-config-repo
        #   default-label: main
        #   clone-on-start: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

