ai:
  recommendations:
    max-results: 10
    similarity-threshold: 0.75
  conversation:
    history-limit: 50

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

