# AI Service specific configuration

spring:
  application:
    name: ai-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/filmpire}
      database: ${MONGODB_DATABASE:filmpire}

# AI service specific settings (Spring AI temporarily disabled)
# ai:
