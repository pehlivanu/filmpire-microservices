# Media Service specific configuration

spring:
  application:
    name: media-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/filmpire}
      database: ${MONGODB_DATABASE:filmpire}

# MinIO configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET:filmpire-media}

# Media service specific settings
media:
  upload:
    max-file-size: 10485760  # 10MB
    allowed-extensions: jpg,jpeg,png,gif,webp,mp4,webm
  storage:
    temp-dir: /tmp/filmpire-uploads

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

