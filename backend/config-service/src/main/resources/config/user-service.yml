# User Service specific configuration

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/filmpire
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# JWT configuration
jwt:
  secret: your-secret-key-change-in-production-min-512-bits
  expiration: 3600000
  refresh-expiration: 604800000

# User service specific settings
user:
  password:
    min-length: 8
    require-special-char: true
  session:
    timeout: 3600

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

