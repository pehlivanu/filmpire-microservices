# Actor Service specific configuration

spring:
  application:
    name: actor-service
  datasource:
    url: jdbc:postgresql://localhost:5432/filmpire
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Actor service specific settings
actor:
  pagination:
    default-size: 20
    max-size: 50
  cache:
    ttl: 7200

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

