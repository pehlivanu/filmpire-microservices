# Movie Service Configuration
# This file is served by Spring Cloud Config Server

# Common settings for all profiles
tmdb:
  api:
    base-url: https://api.themoviedb.org/3

spring:
  cache:
    cache-names:
      - movies
      - movieLists
      - movieVideos
      - movieCredits
      - genres
    redis:
      time-to-live: 300000  # 5 minutes

feign:
  client:
    config:
      tmdb-client:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: BASIC

logging:
  level:
    com.filmpire.movie: DEBUG

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

tmdb:
  api:
    # TMDB API key for development
    key: ae8fa6e23866cb34a49337b233547834

mongodb:
  uri: mongodb://admin:admin123@localhost:27017/filmpire?authSource=admin

redis:
  host: localhost
  port: 6379
  password: redis123

logging:
  level:
    com.filmpire.movie: DEBUG
    feign: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

tmdb:
  api:
    key: ${TMDB_API_KEY:}  # Must be set via environment variable

mongodb:
  uri: ${MONGODB_URI:}  # Must be set via environment variable

redis:
  host: ${REDIS_HOST:}  # Must be set via environment variable
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}  # Must be set via environment variable

logging:
  level:
    com.filmpire.movie: INFO
    feign: INFO
