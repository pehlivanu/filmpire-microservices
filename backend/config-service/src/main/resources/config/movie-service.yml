# Movie Service specific configuration

spring:
  application:
    name: movie-service
  data:
    mongodb:
      uri: mongodb://admin:admin123@localhost:27017/filmpire?authSource=admin
      database: filmpire
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  redis:
    host: localhost
    port: 6379

# Movie service specific settings
movie:
  cache:
    ttl: 3600
  pagination:
    default-size: 20
    max-size: 100

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

