# Test profile: no discovery infra, no Redis (cache no-op); the PostgreSQL
# datasource comes from Testcontainers via @ServiceConnection.
spring:
  cloud:
    discovery:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  cache:
    type: none

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
