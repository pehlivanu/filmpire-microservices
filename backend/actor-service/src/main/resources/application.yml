server:
  port: 8083
  # Honor X-Forwarded-* from the gateway so HATEOAS _links reflect the public
  # gateway host (localhost:8080) rather than the internal service host.
  forward-headers-strategy: framework

spring:
  application:
    name: actor-service
  datasource:
    # Database-per-service (ADR-002): actor-service owns its own database so its
    # Flyway history never collides with user-service's in the shared instance.
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/filmpire_actor}
    username: ${POSTGRES_USERNAME:admin}
    password: ${POSTGRES_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only checks the mapping against it.
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes, matching the movie-service facade

# TMDB API configuration (server-side key only — clients' api_key is ignored)
tmdb:
  api:
    key: ${TMDB_API_KEY:}
    base-url: https://api.themoviedb.org/3

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    # Without this, Eureka registers the instance by hostname; on a machine
    # where that hostname resolves to a non-routable/IPv6 address, the
    # gateway's lb:// route to actor-service hangs until connect-timeout.
    # movie-service already sets this — matching it here.
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
