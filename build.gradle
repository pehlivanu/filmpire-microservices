plugins {
    id 'java'
    id 'org.springframework.boot' apply false
    id 'io.spring.dependency-management' apply false
    // OpenRewrite drives automated framework migrations (e.g. Spring Boot
    // version upgrades) as reviewable, idempotent source transformations.
    // Run `./gradlew rewriteDryRun` to preview, `./gradlew rewriteRun` to apply.
    id 'org.openrewrite.rewrite' version "${openRewriteVersion}"
}

allprojects {
    group = 'com.filmpire'
    version = projectVersion
}

// OpenRewrite recipe wiring. Recipe artifacts resolve from the settings-level
// repositories (settings.gradle enforces FAIL_ON_PROJECT_REPOS, so no
// project-scoped repositories block is used here). The rewrite-recipe-bom pins
// a mutually-compatible set of recipe module versions.
dependencies {
    rewrite platform("org.openrewrite.recipe:rewrite-recipe-bom:${rewriteRecipeBomVersion}")
    rewrite 'org.openrewrite.recipe:rewrite-spring'
}

rewrite {
    // Full Spring Boot 3.5 -> 4.0 migration: bumps Boot/Cloud/Framework/Security,
    // renames deprecated starters, and rewrites deprecated/renamed APIs and
    // configuration properties. See ADR-009.
    activeRecipe('org.openrewrite.java.spring.boot4.UpgradeSpringBoot_4_0')
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'
    apply plugin: 'jacoco'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(Integer.parseInt(project.property('javaVersion').toString()))
        }
    }

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
        options.release = Integer.parseInt(project.property('javaVersion').toString())
        options.compilerArgs += ['-parameters']
    }

    tasks.withType(Test) {
        useJUnitPlatform()
        
        // Clean, readable test output
        testLogging {
            // Only show failures and skipped tests by default (less noise)
            // Use --info flag to see all tests: ./gradlew test --info
            events = ['failed', 'skipped']
            exceptionFormat = 'full'
            showStandardStreams = false
            showCauses = true
            showStackTraces = true
            
            // Show test class progress
            info {
                events = ['started', 'passed', 'skipped', 'failed']
                exceptionFormat = 'full'
            }
            
            // Summary at the end
            afterSuite { desc, result ->
                if (!desc.parent) {
                    def output = "Results: ${result.resultType} (${result.testCount} tests, ${result.successfulTestCount} passed, ${result.failedTestCount} failed, ${result.skippedTestCount} skipped)"
                    def startItem = '|  ', endItem = '  |'
                    def repeatLength = startItem.length() + output.length() + endItem.length()
                    println('\n' + ('=' * repeatLength))
                    println(startItem + output + endItem)
                    println('=' * repeatLength)
                }
            }
        }
    }
    
    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
            mavenBom "org.testcontainers:testcontainers-bom:${testcontainersVersion}"
        }
    }
    
    // JaCoco configuration for test coverage
    jacoco {
        toolVersion = "${jacocoVersion}"
    }
    
    jacocoTestReport {
        dependsOn test
        reports {
            xml.required = true
            html.required = true
        }
    }
    
    test {
        finalizedBy jacocoTestReport
    }
    
    // Common test dependencies
    dependencies {
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }
}

task startInfrastructure(type: Exec) {
    group = 'execution'
    description = 'Starts the Movie Service infrastructure (Discovery, Config, Gateway, Movie Service)'
    commandLine './start-all-services.sh'
}

